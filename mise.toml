#! schema https://mise.jdx.dev/schema/mise.json

[settings]
experimental = true
npm.package_manager = "bun"

[env]
_.path = ["{{config_root}}/node_modules/.bin"]
HK_MISE = "1"
HK_PKL_BACKEND = "pklr"

[tools]
bun = "1.3.14"
gh = "2.93.0"
node = "24.16.0"
"github:nats-io/nats-server" = "2.14.0"
"github:nats-io/natscli" = "0.4.0"

[deps.bun]
auto = true
