name: RPC Integration

# Path-filtered integration CI for the rpc subsystem (ADR-0003 move 3,
# subsystem-branding issue 0005): provision the toolchain via mise (which
# pins the nats-server the suite spawns), build the published surface (the
# private integration package imports it exactly as an external consumer
# would, so its imports resolve to built dist output), then run the suite.
# Runs only when the rpc subsystem directory (or this workflow) changes.
#
# The repo-wide Release workflow's wait-for-other-workflows gate polls runs by
# head_sha, so on pushes that don't touch the subsystem this workflow simply
# never appears — absent, not blocking.

on:
  push:
    branches: [main]
    paths:
      - packages/rpc/**
      - .github/workflows/rpc-integration.yml
  pull_request:
    paths:
      - packages/rpc/**
      - .github/workflows/rpc-integration.yml

permissions: {}

concurrency:
  group: rpc-integration-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  integration:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-workspace

      - name: Build the published surface
        run: bun run build

      - name: Run the rpc integration suite
        run: bun run --filter '@insler/rpc-integration' test:integration
